log_format custom '$remote_addr - $http_x_forwarded_for [$time_local] "$request" ' # log_format has to be delclared outside the server block
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
server {
  listen 8080;
  server_name _;

  access_log /var/log/nginx/access.log custom;

  sendfile        on;
  client_max_body_size 20M;
  keepalive_timeout  0;

  proxy_set_header   Host             $host;
  proxy_set_header   X-Real-IP        $remote_addr;
  proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

  proxy_connect_timeout      90;
  proxy_send_timeout         90;
  proxy_read_timeout         90;

  proxy_redirect     off;

  location / {
        proxy_pass         http://127.0.0.1:3000/;
        error_log /var/log/applications/errors_web.log;
  }

  location /_next/ {
        alias /app/.web/_static/_next/;
  }

  location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        error_log /var/log/applications/errors_api.log;
  }
}