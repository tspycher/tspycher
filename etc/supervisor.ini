[supervisord]
user = root
nodaemon=true

[program:pc]
command = pc run --env prod
stdout_logfile	= /var/log/applications/%(program_name)s.log
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true


[program:nginx]
command = /usr/sbin/nginx
stdout_logfile	= /var/log/applications/%(program_name)s.log
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
